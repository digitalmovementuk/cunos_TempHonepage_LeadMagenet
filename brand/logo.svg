    <circle cx="30" cy="28" r="2.6" fill="url(#cunos-accent)" />

    <!-- Wordmark -->
    <text x="50" y="37" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
