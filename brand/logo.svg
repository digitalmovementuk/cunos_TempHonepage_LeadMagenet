  <defs>
    <linearGradient id="cunos-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0071E3" />
      <stop offset="100%" stop-color="#5cb3ff" />
    </linearGradient>
  </defs>
  <g>
